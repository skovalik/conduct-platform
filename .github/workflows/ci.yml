# conduct-platform CI matrix. Runs across Windows, macOS, and Linux: typecheck
# (the schema/type lint), the test suite, and a REAL generator emit through the
# orchestrator (guards the npx-spawn path so it cannot silently degrade to the
# fallback on a whole platform again).
name: ci
on:
  push:
  pull_request:
jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - name: Typecheck (schema and type lint)
        run: npm run typecheck
      - name: Tests
        run: npm test
      - name: Generator path (real rulesync via the orchestrator; guards the npx spawn)
        run: node scripts/ci-generator-check.mjs
